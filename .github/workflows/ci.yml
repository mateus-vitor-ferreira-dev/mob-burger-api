name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mob_burger
          POSTGRES_PASSWORD: mob-burger
          POSTGRES_DB: mob_burger_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://mob_burger:mob-burger@localhost:5433/mob_burger_test
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 30d
      GOOGLE_CLIENT_ID: fake-google-client-id
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_fake
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npx vitest run src/**/*.test.ts --reporter=verbose

      - name: Run integration tests
        run: npx vitest run tests/integration --reporter=verbose

      - name: Coverage report
        run: npx vitest run --coverage
        if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
